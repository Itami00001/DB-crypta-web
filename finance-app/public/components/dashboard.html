<!-- Компонент дашборда -->
<div class="container mt-4">
    <h2><i class="bi bi-speedometer2"></i> Дашборд</h2>
    
    <!-- Статистические карточки -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card bg-primary text-white">
                <div class="card-body">
                    <h5 class="card-title">Пользователи</h5>
                    <h3 id="totalUsers">-</h3>
                    <small>Всего пользователей</small>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-success text-white">
                <div class="card-body">
                    <h5 class="card-title">Криптовалюты</h5>
                    <h3 id="totalCrypto">-</h3>
                    <small>Активные монеты</small>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-warning text-white">
                <div class="card-body">
                    <h5 class="card-title">Кошельки</h5>
                    <h3 id="totalWallets">-</h3>
                    <small>Всего кошельков</small>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-info text-white">
                <div class="card-body">
                    <h5 class="card-title">Транзакции</h5>
                    <h3 id="totalTransactions">-</h3>
                    <small>Всего транзакций</small>
                </div>
            </div>
        </div>
    </div>

    <!-- Графики и аналитика -->
    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5><i class="bi bi-graph-up"></i> Рыночная капитализация</h5>
                </div>
                <div class="card-body">
                    <canvas id="marketCapChart"></canvas>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5><i class="bi bi-pie-chart"></i> Распределение транзакций</h5>
                </div>
                <div class="card-body">
                    <canvas id="transactionChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Последние активности -->
    <div class="row mt-4">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5><i class="bi bi-clock-history"></i> Последние транзакции</h5>
                </div>
                <div class="card-body">
                    <div id="recentTransactions">
                        <div class="text-center">
                            <div class="spinner-border spinner-border-sm" role="status">
                                <span class="visually-hidden">Загрузка...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5><i class="bi bi-fire"></i> Популярные криптовалюты</h5>
                </div>
                <div class="card-body">
                    <div id="popularCrypto">
                        <div class="text-center">
                            <div class="spinner-border spinner-border-sm" role="status">
                                <span class="visually-hidden">Загрузка...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
